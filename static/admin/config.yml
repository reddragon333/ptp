backend:
  name: gitea
  repo: ptpadmin/ptp
  branch: main
  api_root: https://ptp.saguaro-cactus.ru/gitea/api/v1
  base_url: https://ptp.saguaro-cactus.ru/gitea
  app_id: 64bba744-0afb-4987-b4f4-c2fc7d7485f4

media_folder: static/images/uploads
public_folder: /images/uploads
locale: ru

collections:
  - name: post
    label: Посты / Поездки
    label_singular: Пост
    folder: content/post
    create: true
    format: toml-frontmatter
    extension: md
    fields:
      - { label: Заголовок, name: title, widget: string }
      - { label: Slug (URL), name: slug, widget: string }
      - { label: Дата, name: date, widget: datetime, format: 'YYYY-MM-DDTHH:mm:ss', default: '' }
      - { label: Описание (анонс), name: description, widget: string }
      - { label: Обложка (URL из S3), name: image, widget: string, required: false }
      - { label: Контент, name: body, widget: markdown }
