<!--
PhotoSwipe 5 loader shortcode (theme variant)
Replaces hugo-easy-gallery's PhotoSwipe 4 integration
-->

<!-- prevent this shortcode from being loaded more than once per page -->
{{ if not ($.Page.Scratch.Get "photoswipeloaded") }}
  {{ $.Page.Scratch.Set "photoswipeloaded" 1 }}

<!-- PhotoSwipe 5 CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.min.css" />

<!-- PhotoSwipe 5 initialization -->
<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe-lightbox.esm.min.js';
import PhotoSwipe from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.esm.min.js';

const lightbox = new PhotoSwipeLightbox({
  gallery: '.gallery',
  children: 'a[href]',
  pswpModule: PhotoSwipe,
  bgOpacity: 0.85,
  padding: { top: 20, bottom: 20, left: 20, right: 20 },
});

// For images without data-pswp-width/height, provide initial dimensions
// and let PhotoSwipe update them once the image loads
lightbox.addFilter('itemData', (itemData, index) => {
  const el = itemData.element;
  if (el) {
    itemData.src = itemData.src || el.href;
    // Use data attributes if provided, otherwise use placeholders
    if (!itemData.width) {
      const w = el.dataset.pswpWidth;
      const h = el.dataset.pswpHeight;
      if (w && h) {
        itemData.width = parseInt(w, 10);
        itemData.height = parseInt(h, 10);
      } else {
        // Placeholder — will be corrected once image loads
        itemData.width = 1920;
        itemData.height = 1280;
      }
    }
  }
  return itemData;
});

// When image content loads, update to actual dimensions
lightbox.on('contentLoad', (e) => {
  const { content } = e;
  if (content.data.src && !content.data.element?.dataset?.pswpWidth) {
    const img = new Image();
    img.onload = function() {
      content.width = img.naturalWidth;
      content.height = img.naturalHeight;
      content.updateSize?.(true);
    };
    img.src = content.data.src;
  }
});

lightbox.init();
</script>

{{ end }}
